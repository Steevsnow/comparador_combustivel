<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Combustível Pro</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icone.png">
    <meta name="theme-color" content="#27ae60">
    <style>
        :root {
            --primary: #27ae60;
            --secondary: #2980b9;
            --bg: #121212;
            --card: #1e1e1e;
            --text: #ffffff;
            --danger: #e74c3c;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .app-card {
            background: var(--card);
            padding: 2rem;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        h1 { font-size: 1.5rem; margin-bottom: 2rem; font-weight: 800; color: #ddd; }

        .input-container {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.8rem;
            letter-spacing: 1px;
            font-weight: bold;
        }

        .label-etanol { color: var(--primary); }
        .label-gasolina { color: var(--secondary); }

        input {
            width: 100%;
            padding: 18px;
            background: #2c2c2c;
            border: 2px solid #3d3d3d;
            border-radius: 15px;
            font-size: 1.8rem;
            color: #fff;
            text-align: center;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s;
        }

        #etanol:focus { border-color: var(--primary); }
        #gasolina:focus { border-color: var(--secondary); }

        /* Grade de botões */
        .button-group {
            display: grid;
            grid-template-columns: 2fr 1fr; /* Calcular maior que o Limpar */
            gap: 10px;
            margin-top: 10px;
        }

        button {
            padding: 18px;
            border: none;
            border-radius: 15px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .btn-calc { background: white; color: black; }
        .btn-clear { background: #333; color: var(--danger); border: 1px solid #444; }

        button:active { transform: scale(0.95); }

        #resultado {
            margin-top: 1.8rem;
            padding: 20px;
            border-radius: 15px;
            display: none;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .melhor-etanol { background: #1b4332; border: 2px solid var(--primary); color: #b7e4c7; }
        .melhor-gasolina { background: #1a3a5a; border: 2px solid var(--secondary); color: #a2d2ff; }
        
        .veredito-txt { font-size: 1.3rem; font-weight: bold; display: block; }
        .info-txt { font-size: 0.85rem; opacity: 0.9; margin-top: 5px; display: block; }
    </style>
</head>
<body>

<div class="app-card">
    <h1>⛽ Gasolina ou Etanol?</h1>
    
    <div class="input-container">
        <label class="label-etanol">PREÇO ETANOL</label>
        <input type="text" id="etanol" placeholder="0,00" inputmode="numeric" oninput="mascaraMoeda(this)">
    </div>

    <div class="input-container">
        <label class="label-gasolina">PREÇO GASOLINA</label>
        <input type="text" id="gasolina" placeholder="0,00" inputmode="numeric" oninput="mascaraMoeda(this)">
    </div>

    <div class="button-group">
        <button class="btn-calc" onclick="calcular()">CALCULAR</button>
        <button class="btn-clear" onclick="limpar()">LIMPAR</button>
    </div>

    <div id="resultado">
        <span class="veredito-txt" id="veredito"></span>
        <span class="info-txt" id="detalhe"></span>
    </div>
</div>

<script>
    function mascaraMoeda(campo) {
        let valor = campo.value.replace(/\D/g, "");
        if (valor.length === 0) {
            campo.value = "";
            return;
        }
        valor = (parseFloat(valor) / 100).toFixed(2);
        campo.value = valor.replace(".", ",");
    }

    function limpar() {
        document.getElementById('etanol').value = "";
        document.getElementById('gasolina').value = "";
        document.getElementById('resultado').style.display = "none";
        document.getElementById('etanol').focus();
    }

    function calcular() {
        const etanolVal = document.getElementById('etanol').value.replace(",", ".");
        const gasolinaVal = document.getElementById('gasolina').value.replace(",", ".");
        
        const pEtanol = parseFloat(etanolVal);
        const pGasolina = parseFloat(gasolinaVal);
        const resDiv = document.getElementById('resultado');

        if (pEtanol > 0 && pGasolina > 0) {
            const relacao = pEtanol / pGasolina;
            resDiv.style.display = 'block';

            if (relacao <= 0.70) {
                resDiv.className = 'melhor-etanol';
                document.getElementById('veredito').innerText = "Vá de ETANOL! 🌿";
            } else {
                resDiv.className = 'melhor-gasolina';
                document.getElementById('veredito').innerText = "Vá de GASOLINA! ⛽";
            }
            document.getElementById('detalhe').innerText = `O etanol custa ${(relacao * 100).toFixed(1)}% da gasolina`;
        } else {
            alert("Por favor, preencha os valores.");
        }
    }
</script>

</body>
</html>
